name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test --configuration Release

      - name: Publish
        run: >
          dotnet publish src/VPinCommander.App -c Release -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -o publish

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath "VPinCommander-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "VPinCommander-${{ github.ref_name }}-win-x64.zip"
          --title "VPin Commander ${{ github.ref_name }}"
          --generate-notes
