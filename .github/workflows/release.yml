name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test --configuration Release

      - name: Publish
        # Self-contained since the embedded remote-control server needs the
        # ASP.NET Core runtime — bundling it means cabinets install nothing extra.
        run: >
          dotnet publish src/VPinCommander.App -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath "VPinCommander-${{ github.ref_name }}-win-x64.zip"

      - name: Build installer
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "iscc" }
          & $iscc "/DMyAppVersion=$ver" installer\VPinCommander.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed" }
          Copy-Item "installer-out\VPinCommander-Setup-$ver.exe" .

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          gh release create "${{ github.ref_name }}" `
            "VPinCommander-Setup-$ver.exe" `
            "VPinCommander-${{ github.ref_name }}-win-x64.zip" `
            --title "VPin Commander ${{ github.ref_name }}" `
            --generate-notes
